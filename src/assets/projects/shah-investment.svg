<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="shah-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#01161e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b3c49;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="shah-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52b788;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1b4332;stop-opacity:0.9" />
    </linearGradient>
    
    <linearGradient id="shah-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74c69d;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2d6a4f;stop-opacity:0.9" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" rx="12" fill="url(#shah-bg)" />
  
  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <path d="M 0,20 L 400,20 M 0,40 L 400,40 M 0,60 L 400,60 M 0,80 L 400,80 M 0,100 L 400,100 M 0,120 L 400,120 M 0,140 L 400,140 M 0,160 L 400,160 M 0,180 L 400,180" />
    <path d="M 40,0 L 40,200 M 80,0 L 80,200 M 120,0 L 120,200 M 160,0 L 160,200 M 200,0 L 200,200 M 240,0 L 240,200 M 280,0 L 280,200 M 320,0 L 320,200 M 360,0 L 360,200" />
  </g>

  <!-- Decorative circles -->
  <circle cx="350" cy="50" r="55" fill="url(#shah-emerald)" opacity="0.15" filter="url(#glow)" />
  <circle cx="50" cy="150" r="45" fill="url(#shah-teal)" opacity="0.18" filter="url(#glow)" />

  <!-- Investment dashboard graphic -->
  <g transform="translate(110, 40)">
    <!-- Base Board Frame -->
    <rect width="180" height="95" rx="8" fill="#011f26" stroke="#0f4c5c" stroke-width="1.5" />
    
    <!-- Header/Title -->
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#74c69d">PORTFOLIO GROWTH</text>
    <text x="12" y="32" font-family="Inter, sans-serif" font-size="9" fill="#95d5b2" opacity="0.7">SIP Advisory &amp; Analytics</text>
    <text x="168" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#52b788" text-anchor="end">+24.8%</text>

    <!-- Growing Line Chart inside Dashboard -->
    <path d="M 20,80 L 50,75 L 80,60 L 110,65 L 140,45 L 160,35" fill="none" stroke="#52b788" stroke-width="3" stroke-linecap="round" />
    <!-- Gradient Fill below the line -->
    <path d="M 20,80 L 50,75 L 80,60 L 110,65 L 140,45 L 160,35 L 160,82 L 20,82 Z" fill="url(#shah-teal)" opacity="0.15" />
    
    <!-- Chart node dots -->
    <circle cx="50" cy="75" r="2.5" fill="#ffffff" />
    <circle cx="80" cy="60" r="2.5" fill="#ffffff" />
    <circle cx="110" cy="65" r="2.5" fill="#ffffff" />
    <circle cx="140" cy="45" r="2.5" fill="#ffffff" />
    <circle cx="160" cy="35" r="3.5" fill="#74c69d" stroke="#ffffff" stroke-width="1" />
    
    <!-- X-Axis line -->
    <line x1="15" y1="82" x2="165" y2="82" stroke="#0f4c5c" stroke-width="1" />
  </g>
  
  <!-- Floating gold coin icons -->
  <g transform="translate(65, 75)" filter="url(#glow)">
    <circle cx="15" cy="15" r="10" fill="#ffb703" stroke="#e0a100" stroke-width="1" />
    <text x="15" y="19" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">₹</text>
  </g>
  <g transform="translate(305, 55)" filter="url(#glow)">
    <circle cx="15" cy="15" r="12" fill="#ffb703" stroke="#e0a100" stroke-width="1" />
    <text x="15" y="20" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">₹</text>
  </g>

  <!-- Title/Label text -->
  <text x="200" y="165" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#d8f3dc" text-anchor="middle" letter-spacing="0.5">SHAH INVESTMENT</text>
  <text x="200" y="182" font-family="Inter, sans-serif" font-size="11" fill="#74c69d" text-anchor="middle">Retail Wealth Advisory &amp; SIP Performance Evaluation</text>
</svg>
