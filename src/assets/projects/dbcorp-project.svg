<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="dbproj-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c000f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a0e2e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Coral/Rose Gradient -->
    <linearGradient id="rose-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff758f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9184a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" rx="12" fill="url(#dbproj-bg)" />
  
  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.03">
    <path d="M 0,20 L 400,20 M 0,40 L 400,40 M 0,60 L 400,60 M 0,80 L 400,80 M 0,100 L 400,100 M 0,120 L 400,120 M 0,140 L 400,140 M 0,160 L 400,160 M 0,180 L 400,180" />
    <path d="M 40,0 L 40,200 M 80,0 L 80,200 M 120,0 L 120,200 M 160,0 L 160,200 M 200,0 L 200,200 M 240,0 L 240,200 M 280,0 L 280,200 M 320,0 L 320,200 M 360,0 L 360,200" />
  </g>

  <!-- Decorative circles -->
  <circle cx="340" cy="50" r="50" fill="url(#rose-grad)" opacity="0.15" filter="url(#glow)" />
  <circle cx="60" cy="150" r="40" fill="#c9184a" opacity="0.15" filter="url(#glow)" />

  <!-- Flowchart representation of departments (Left to Right) -->
  <g transform="translate(60, 45)">
    <!-- Department Column 1 -->
    <rect x="0" y="5" width="65" height="22" rx="4" fill="#222" stroke="#ff758f" stroke-width="1.5" />
    <text x="32" y="19" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">MARKETING</text>
    
    <rect x="0" y="35" width="65" height="22" rx="4" fill="#222" stroke="#ff758f" stroke-width="1.5" />
    <text x="32" y="49" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">HUMAN RES</text>
    
    <!-- Connecting lines to central node -->
    <path d="M 65,16 Q 110,16 130,30" fill="none" stroke="#ff85a1" stroke-width="1.5" stroke-dasharray="3 1" />
    <path d="M 65,46 Q 110,46 130,32" fill="none" stroke="#ff85a1" stroke-width="1.5" stroke-dasharray="3 1" />

    <!-- Central Node (Departmental Synergy / Interlocking Gears) -->
    <g transform="translate(140, 20)">
      <circle cx="15" cy="15" r="20" fill="url(#rose-grad)" filter="url(#glow)" />
      <!-- Gear shape inside circle -->
      <path d="M 15,3 L 15,27 M 3,15 L 27,15 M 6,6 L 24,24 M 6,24 L 24,6" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
      <circle cx="15" cy="15" r="8" fill="#4a0e2e" />
    </g>
    
    <!-- Flow to Business Analysis/Corporate Insights (Right Side) -->
    <line x1="175" y1="35" x2="210" y2="35" stroke="#ff758f" stroke-width="2" />
    <polygon points="215,35 208,31 208,39" fill="#ff758f" />
    
    <!-- Department Column 3 -->
    <rect x="215" y="20" width="70" height="30" rx="4" fill="#222" stroke="#ff758f" stroke-width="1.5" />
    <text x="250" y="35" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#ff758f" text-anchor="middle">EFFICIENCY</text>
    <text x="250" y="45" font-family="Inter, sans-serif" font-size="7" fill="#888" text-anchor="middle">Corporate Insights</text>
  </g>

  <!-- Title/Label text -->
  <text x="200" y="165" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ff758f" text-anchor="middle" letter-spacing="0.5">D.B CORP CORPORATE ANALYSIS</text>
  <text x="200" y="182" font-family="Inter, sans-serif" font-size="11" fill="#ff85a1" text-anchor="middle">Operational Efficiency Study &amp; Cross-Functional Strategy</text>
</svg>
