<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="sip-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#140c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a2300;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe49e;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#ffb703;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb8500;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" rx="12" fill="url(#sip-bg)" />
  
  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.03">
    <path d="M 0,20 L 400,20 M 0,40 L 400,40 M 0,60 L 400,60 M 0,80 L 400,80 M 0,100 L 400,100 M 0,120 L 400,120 M 0,140 L 400,140 M 0,160 L 400,160 M 0,180 L 400,180" />
    <path d="M 40,0 L 40,200 M 80,0 L 80,200 M 120,0 L 120,200 M 160,0 L 160,200 M 200,0 L 200,200 M 240,0 L 240,200 M 280,0 L 280,200 M 320,0 L 320,200 M 360,0 L 360,200" />
  </g>

  <!-- Decorative blur circles -->
  <circle cx="350" cy="150" r="50" fill="url(#gold-grad)" opacity="0.12" filter="url(#glow)" />
  <circle cx="50" cy="50" r="40" fill="#fb8500" opacity="0.15" filter="url(#glow)" />

  <!-- Calendar (Recurring aspect of SIP) on Left -->
  <g transform="translate(60, 45)">
    <rect width="60" height="65" rx="6" fill="#222" stroke="#444" stroke-width="1.5" />
    <!-- Calendar Top Red strip -->
    <path d="M 0,5 A 5,5 0 0 1 5,0 L 55,0 A 5,5 0 0 1 60,5 L 60,18 L 0,18 Z" fill="#fb8500" />
    <!-- Calendar rings -->
    <rect x="12" y="-5" width="6" height="8" rx="2" fill="#fff" />
    <rect x="42" y="-5" width="6" height="8" rx="2" fill="#fff" />
    <!-- Date Text -->
    <text x="30" y="45" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#ffffff" text-anchor="middle">SIP</text>
    <text x="30" y="58" font-family="Inter, sans-serif" font-size="8" font-weight="bold" fill="#ffb703" text-anchor="middle" letter-spacing="1">MONTHLY</text>
  </g>
  
  <!-- Growing Steps of Wealth (Right Side) -->
  <g transform="translate(180, 40)">
    <!-- Growing stacks of coins / bars -->
    <!-- Bar 1 (Lowest) -->
    <rect x="0" y="60" width="22" height="20" rx="3" fill="#222" stroke="#555" stroke-width="1" />
    <ellipse cx="11" cy="60" rx="11" ry="3.5" fill="url(#gold-grad)" />
    
    <!-- Bar 2 -->
    <rect x="30" y="45" width="22" height="35" rx="3" fill="#222" stroke="#666" stroke-width="1" />
    <ellipse cx="41" cy="45" rx="11" ry="3.5" fill="url(#gold-grad)" />
    <ellipse cx="41" cy="53" rx="11" ry="3" fill="url(#gold-grad)" opacity="0.8" />
    
    <!-- Bar 3 -->
    <rect x="60" y="30" width="22" height="50" rx="3" fill="#222" stroke="#777" stroke-width="1" />
    <ellipse cx="71" cy="30" rx="11" ry="3.5" fill="url(#gold-grad)" />
    <ellipse cx="71" cy="38" rx="11" ry="3" fill="url(#gold-grad)" opacity="0.8" />
    <ellipse cx="71" cy="46" rx="11" ry="3" fill="url(#gold-grad)" opacity="0.6" />

    <!-- Bar 4 (Highest) -->
    <rect x="90" y="10" width="22" height="70" rx="3" fill="#222" stroke="#ffb703" stroke-width="1" />
    <ellipse cx="101" cy="10" rx="11" ry="3.5" fill="url(#gold-grad)" />
    <ellipse cx="101" cy="18" rx="11" ry="3" fill="url(#gold-grad)" opacity="0.8" />
    <ellipse cx="101" cy="26" rx="11" ry="3" fill="url(#gold-grad)" opacity="0.6" />
    <ellipse cx="101" cy="34" rx="11" ry="3" fill="url(#gold-grad)" opacity="0.4" />
    
    <!-- Arrow indicating growth trend -->
    <path d="M 11,50 Q 55,25 98,2" fill="none" stroke="#fb8500" stroke-width="2.5" stroke-dasharray="3 2" />
    <polygon points="101,0 93,0 98,7" fill="#fb8500" />
  </g>

  <!-- Title/Label text -->
  <text x="200" y="165" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffe49e" text-anchor="middle" letter-spacing="0.5">INVESTOR AWARENESS ON SIP</text>
  <text x="200" y="182" font-family="Inter, sans-serif" font-size="11" fill="#ffb703" text-anchor="middle">Retail Investment Behavior &amp; Preferences Survey in Gujarat</text>
</svg>
