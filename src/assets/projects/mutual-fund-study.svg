<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="mf-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#03071e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a192f;stop-opacity:1" />
    </linearGradient>
    
    <!-- Cyan/Blue Gradients -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64ffda;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0.9" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" rx="12" fill="url(#mf-bg)" />
  
  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <path d="M 0,20 L 400,20 M 0,40 L 400,40 M 0,60 L 400,60 M 0,80 L 400,80 M 0,100 L 400,100 M 0,120 L 400,120 M 0,140 L 400,140 M 0,160 L 400,160 M 0,180 L 400,180" />
    <path d="M 40,0 L 40,200 M 80,0 L 80,200 M 120,0 L 120,200 M 160,0 L 160,200 M 200,0 L 200,200 M 240,0 L 240,200 M 280,0 L 280,200 M 320,0 L 320,200 M 360,0 L 360,200" />
  </g>

  <!-- Decorative circles -->
  <circle cx="340" cy="150" r="50" fill="url(#cyan-grad)" opacity="0.12" filter="url(#glow)" />
  <circle cx="50" cy="50" r="40" fill="#00b4d8" opacity="0.15" filter="url(#glow)" />

  <!-- Analysis Dashboard Visual (Center) -->
  <g transform="translate(80, 40)">
    <!-- Base dashboard border -->
    <rect width="240" height="90" rx="8" fill="#0b132b" stroke="#1c2541" stroke-width="1.5" />
    
    <!-- Three sector evaluation targets -->
    <!-- Infrastructure (Left) -->
    <g transform="translate(20, 20)">
      <circle cx="20" cy="20" r="18" fill="#1c2541" stroke="#00b4d8" stroke-width="1.5" />
      <text x="20" y="24" font-family="Inter, sans-serif" font-size="8" font-weight="bold" fill="#00b4d8" text-anchor="middle">INFRA</text>
      <!-- Mini graph -->
      <path d="M 5,28 Q 20,38 35,32" fill="none" stroke="#64ffda" stroke-width="1.5" />
    </g>

    <!-- Technology (Middle) -->
    <g transform="translate(100, 20)">
      <circle cx="20" cy="20" r="18" fill="#1c2541" stroke="#64ffda" stroke-width="1.5" filter="url(#glow)" />
      <text x="20" y="24" font-family="Inter, sans-serif" font-size="8" font-weight="bold" fill="#64ffda" text-anchor="middle">TECH</text>
      <!-- Mini graph -->
      <path d="M 5,30 Q 20,15 35,22" fill="none" stroke="#64ffda" stroke-width="1.5" />
    </g>

    <!-- Banking (Right) -->
    <g transform="translate(180, 20)">
      <circle cx="20" cy="20" r="18" fill="#1c2541" stroke="#00b4d8" stroke-width="1.5" />
      <text x="20" y="24" font-family="Inter, sans-serif" font-size="8" font-weight="bold" fill="#00b4d8" text-anchor="middle">BANK</text>
      <!-- Mini graph -->
      <path d="M 5,34 Q 20,25 35,28" fill="none" stroke="#64ffda" stroke-width="1.5" />
    </g>
    
    <!-- Legend / Evaluation metrics -->
    <text x="120" y="76" font-family="Inter, sans-serif" font-size="9" fill="#5c677d" text-anchor="middle">Risk-Return Analysis &amp; Benchmarking</text>
  </g>

  <!-- Title/Label text -->
  <text x="200" y="165" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#64ffda" text-anchor="middle" letter-spacing="0.5">MUTUAL FUND PERFORMANCE EVALUATION</text>
  <text x="200" y="182" font-family="Inter, sans-serif" font-size="11" fill="#00b4d8" text-anchor="middle">Infrastructure, Technology &amp; Banking Mutual Fund Schemes</text>
</svg>
